name: Petrol Ofisi VMax Diesel Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri yükle
        run: pip install -r requirements.txt

      - name: Fiyatları kontrol et
        env:
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python po_check.py

      - name: Güncel fiyat dosyasını kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/last_prices.json
          git commit -m "Update price data" || echo "No changes to commit"
          git push
